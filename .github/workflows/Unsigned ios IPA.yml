name: "Godot iOS Build"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Force Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
      - name: Install Legacy Mono Framework
        run: |
          brew install --cask mono-mdk
          echo "/Library/Frameworks/Mono.framework/Versions/Current/bin" >> $GITHUB_PATH
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.428'

      - name: Setup Godot Mono & Templates
        run: |
          curl -L -o Godot_mono_osx.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip"
          unzip -q -o Godot_mono_osx.zip
          curl -L -o Godot_templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz"
          mkdir -p /tmp/extract
          unzip -q -o Godot_templates.tpz -d /tmp/extract
          REAL_TEMPLATES_DIR=$(find /tmp/extract -name "iphone.zip" -exec dirname {} \;)
          GODOT_HABITAT="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono"
          mkdir -p "$GODOT_HABITAT"
          cp -r "$REAL_TEMPLATES_DIR"/* "$GODOT_HABITAT/"
          mkdir -p /tmp/mono_libs
          cp -r "$GODOT_HABITAT/iphone-mono-libs/"* /tmp/mono_libs/
          APP_PATH=$(find . -name "Godot_mono.app" -type d | head -n 1)
          cp -r "$APP_PATH/Contents/Resources/GodotSharp" ./
          sudo ln -s "$(pwd)/$APP_PATH/Contents/MacOS/Godot" /usr/local/bin/godot
      - name: Godot Export (Assets Only)
        run: |
          mkdir -p ios
          # Rename C# files so Godot doesn't try (and fail) to build them itself
          mv Lacie_Engine.csproj Lacie_Engine.csproj.bak
          mv Lacie_Engine.sln Lacie_Engine.sln.bak
          
          godot --path . --headless --verbose --export "iOS" "ios/game.xcodeproj" --no-build --no-sign || true
          
          # Restore C# files for our manual AOT step
          mv Lacie_Engine.csproj.bak Lacie_Engine.csproj
          mv Lacie_Engine.sln.bak Lacie_Engine.sln
          
      - name: Install iOS Workload
        run: dotnet workload install ios

      - name: Manual C# AOT Compilation
        run: |
          rm -rf ios/manual_aot
          mkdir -p ios/manual_aot/build_space
          
          # 1. PREPARE THE WORKSPACE
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono"
          # Copy your game DLL to our build space
          GAME_DLL=$(find . -name "Lacie_Engine.dll" | grep "Release" | head -n 1)
          cp "$GAME_DLL" ios/manual_aot/build_space/
          
          # Copy GodotSharp DLLs (the 'Bridge') into the same folder
          # These were extracted earlier in your script
          cp GodotSharp/Api/Release/*.dll ios/manual_aot/build_space/
          
          # 2. SETUP THE COMPILER
          AOT_COMPILER="/Library/Frameworks/Mono.framework/Versions/Current/bin/mono-sgen"
          
          # POINT TO THE DICTIONARY (BCL)
          # We use the absolute path to avoid issues with spaces
          export MONO_PATH="$TEMPLATE_DIR/bcl/monotouch:ios/manual_aot/build_space"
          
          echo "Starting AOT compilation in build_space..."
          # We run the compiler from INSIDE the build_space folder
          cd ios/manual_aot/build_space
          $AOT_COMPILER --aot=full,static,asmonly,direct-icalls,nodebug,mtriple=arm64-ios Lacie_Engine.dll
          
          # 3. CONVERT TO LIBRARY
          echo "Converting assembly to static library..."
          clang -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
            -arch arm64 -miphoneos-version-min=12.0 \
            -c Lacie_Engine.dll.s -o ../libproject_assembly.o
          
          cd ..
          ar rcs libproject_assembly.a libproject_assembly.o
          
          # 4. CLEANUP & COLLECT
          # Copy all DLLs from build_space (game + GodotSharp) to the final folder
          cp build_space/*.dll .
          # Also grab the BCL DLLs (mscorlib, etc)
          cp "$TEMPLATE_DIR/bcl/monotouch/"*.dll .
          
          echo "✅ AOT Success! Verifying Architecture:"
          lipo -info libproject_assembly.a
          
      - name: Create Godot Mono Setup Bridge
        run: |
          echo '#include <stdio.h>' > ios/godot_mono_setup.cpp
          echo 'extern "C" void gd_mono_setup_aot() { printf("Manual Mono AOT Initialized\n"); }' >> ios/godot_mono_setup.cpp
      - name: Build Unsigned Xcode Project
        run: |
          LIBS="/tmp/mono_libs"
          # Force the new bundle ID in the project settings
          xcodebuild build \
            -project ios/game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            PRODUCT_BUNDLE_IDENTIFIER="com.paperlily.chapter1" \
            LIBRARY_SEARCH_PATHS="\
              $(pwd)/ios/manual_aot \
              $LIBS/libmonosgen-2.0.xcframework/ios-arm64 \
              $LIBS/libmono-native.xcframework/ios-arm64 \
              $LIBS/libmono-ee-interp.xcframework/ios-arm64 \
              $LIBS/libmono-icall-table.xcframework/ios-arm64 \
              $LIBS/libmono-ilgen.xcframework/ios-arm64 \
              $LIBS/libmono-profiler-log.xcframework/ios-arm64" \
            OTHER_LDFLAGS="\
              -L$(pwd)/ios/manual_aot \
              -lproject_assembly \
              -lmonosgen -lmono-native -lmono-ee-interp -lmono-icall-table -lmono-ilgen -lmono-profiler-log \
              -liconv -lz -framework AudioToolbox -framework AVFoundation -framework CoreAudio -framework CoreGraphics -framework CoreMedia -framework CoreVideo -framework MediaPlayer -framework MobileCoreServices -framework OpenGLES -framework QuartzCore -framework Security -framework UIKit" \
            OTHER_CFLAGS="-DREAL_T_IS_DOUBLE -include $(pwd)/ios/godot_mono_setup.cpp"
      - name: Package Unsigned IPA
        run: |
          mkdir -p Payload
          # 1. Find the compiled .app
          APP_DIR=$(find build/Build/Products/Release-iphoneos -name "*.app" -type d | head -n 1)
          
          # 2. INJECT THE DLLs (The missing "Brain" metadata)
          # We copy all DLLs from our AOT step into the root of the app
          echo "Injecting DLLs into $APP_DIR..."
          cp ios/manual_aot/*.dll "$APP_DIR/"
          
          # 3. FIX BUNDLE ID
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.paperlily.chapter1" "$APP_DIR/Info.plist"
          
          # 4. VERIFY CONTENT (Check the logs to see if they are there!)
          echo "Contents of the final .app bundle:"
          ls -l "$APP_DIR"
          
          # 5. ZIP IT UP
          cp -r "$APP_DIR" Payload/
          zip -r Paper-Lily-Unsigned.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-Unsigned-IPA
          path: Paper-Lily-Unsigned.ipa
