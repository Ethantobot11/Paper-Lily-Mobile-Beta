name: Release
on: workflow_dispatch

permissions: write-all

jobs:
  build-android:
    uses: ./.github/workflows/android-build.yml
  build-ios:
    uses: ./.github/workflows/ios_build.yml

  Releaser:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Build
        uses: actions/download-artifact@main
        with:
          name: Codename Engine Android
          path: ${{ github.workspace }}

      - name: Move Android File
        run: mv "${{ github.workspace }}/PaperLily-release.apk" "${{ github.workspace }}/PaperLily-Android.apk"

      - name: Download iOS Build
        uses: actions/download-artifact@main
        with:
          name: Codename Engine iOS
          path: ${{ github.workspace }}

      - name: Move iOS File
        run: mv "${{ github.workspace }}/PaperLily.ipa" "${{ github.workspace }}/PaperLily-iOS.ipa"

      - name: Publish The Release
        uses: softprops/action-gh-release@v2
        with:
          name: "beta"
          tag_name: "beta v1.5.6"
          prerelease: true
          files: |
            ${{ github.workspace }}/*.apk
            ${{ github.workspace }}/*.ipa
