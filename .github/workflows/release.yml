name: Release
on: workflow_dispatch

permissions: write-all

jobs:
  build-android:
    uses: ./.github/workflows/android-build.yml
  build-ios:
    uses: ./.github/workflows/Unsigned ios IPA.yml
    secrets: inherit

  Releaser:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (Needed for Tags)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Android Build
        uses: actions/download-artifact@v4
        with:
          name: Paper-Lily-Android  # Make sure this matches your Android YAML 'name'
          path: artifacts/android

      - name: Download iOS Build
        uses: actions/download-artifact@v4
        with:
          name: Paper-Lily-Unsigned      # Make sure this matches your iOS YAML 'name'
          path: artifacts/ios

      - name: Prepare Files
        run: |
          # Find the files regardless of exact subfolder
          mv artifacts/android/*.apk ./Paper-Lily-Android.apk
          mv artifacts/ios/*.ipa ./Paper-Lily-iOS.ipa

      - name: Get next tag
        id: tag
        run: |
          git fetch --tags
          latest=$(git tag -l "beta-*" | sort -V | tail -n 1)
          if [ -z "$latest" ]; then
            next="beta-0.0.6"
          else
            version=${latest#beta-}
            IFS='.' read -r major minor patch <<< "$version"
            next="beta-$major.$minor.$((patch+1))"
          fi
          echo "next_tag=$next" >> $GITHUB_OUTPUT

      - name: Publish The Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Paper Lily ${{ steps.tag.outputs.next_tag }}"
          tag_name: ${{ steps.tag.outputs.next_tag }}
          files: |
            ./Paper-Lily-Android.apk
            ./Paper-Lily-iOS.ipa
