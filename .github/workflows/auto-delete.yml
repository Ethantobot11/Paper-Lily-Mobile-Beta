name: Cleanup Failed or Stopped Workflows

permissions: write-all

on:
  workflow_dispatch:   # Manual trigger
  schedule:
    - cron: "*/5 * * * *"   # Every 5 minutes

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Failed or Stopped Runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get workflow runs (up to 100 most recent)
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              per_page: 100
            });

            const now = new Date();

            for (const run of runs.data.workflow_runs) {
              const created = new Date(run.created_at);
              const ageMinutes = (now - created) / 1000 / 60;

              // Delete if failed or cancelled and older than 60 minutes
              if ((run.status === 'completed') && (run.conclusion === 'failure' || run.conclusion === 'cancelled') && ageMinutes > 60) {
                console.log(`Deleting run #${run.id} (${run.name}) created at ${run.created_at}, conclusion: ${run.conclusion}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
              }
            }
