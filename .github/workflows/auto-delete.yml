name: Cleanup Failed Workflows

permissions: write-all

# Run every 5 minutes (GitHub schedules are in UTC)
on:
  workflow_dispatch:   # Manual trigger
  schedule:            # Scheduled trigger
    - cron: "*/5 * * * *"   # Every 5 minutes

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Failed Runs
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Get workflow runs in the last 1 hour
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              status: 'failure',
              per_page: 100
            });

            const now = new Date();
            for (const run of runs.data.workflow_runs) {
              const created = new Date(run.created_at);
              const ageMinutes = (now - created) / 1000 / 60;

              if (ageMinutes > 5) {
                console.log(`Deleting run #${run.id} (${run.name}) created at ${run.created_at}`);
                await github.rest.actions.deleteWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id
                });
              }
            }
