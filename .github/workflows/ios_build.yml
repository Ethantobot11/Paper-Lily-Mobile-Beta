name: "Godot iOS Build (Unsigned)"

on:
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-ios:
    # iOS builds absolutely require macOS runners to use Xcode
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      # 1. Install Mono on macOS (Required for Godot C#)
      - name: Install Mono
        run: |
          brew update
          brew install mono

      - name: Install NuGet
        run: |
          brew update
          brew install nuget

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4

        with:
          dotnet-version: '6.0.428'

      - name: Pin .NET Version
        run: |
          echo '{"sdk": {"version": "6.0.428", "rollForward": "latestMinor"}}' > global.json

      # 2. Setup Godot Mono & Mono Export Templates for macOS
      - name: Setup Godot Mono & Templates
        run: |
          # Use curl instead of wget for macOS runners
          # Download Mono Engine for macOS
          curl -L -o Godot_mono_osx.zip "https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_osx.universal.zip&platform=osx.universal"
          unzip -q -o Godot_mono_osx.zip
          
          # Download Templates
          curl -L -o Godot_templates.tpz "https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_export_templates.tpz&platform=templates"
          
          # Extract to temporary folder
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          
          # Godot looks for templates in ~/Library/Application Support/Godot/ on macOS
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          mv /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          
      # 3. Manually Compile C# Solution via MSBuild
      - name: Build C# Project
        run: |
          # Use dotnet but force it to build the project file specifically
          dotnet build Lacie_Engine.csproj -c Release

      # 4. Export Raw Xcode Project
      - name: Force Export (Ghost Mode)
        env:
          LANG: "en_US.UTF-8"
          LC_ALL: "en_US.UTF-8"
        run: |
          # 1. Back up the project file
          cp project.godot project.godot.bak

          # 2. REMOVE the [mono] section from project.godot temporarily.
          # This tricks the Godot binary into thinking it's a GDSCRIPT project,
          # which skips the buggy Mono path-finding code entirely.
          sed -i '' '/\[mono\]/,/^\s*$/d' project.godot
          
          # 3. Create build directory
          mkdir -p build/ios

          # 4. Run the export
          # Godot will now export the .pck and project files without crashing.
          ./Godot_mono.app/Contents/MacOS/Godot --no-window --audio-driver Dummy --export "iOS" build/ios/game.xcodeproj

          # 5. Restore the project file
          mv project.godot.bak project.godot

          # 6. MANUALLY inject your pre-compiled DLLs into the Xcode structure
          # Since Godot didn't 'know' it was a Mono project, we move the files ourselves.
          # This path is where Godot 3.5.x expects them in the Xcode project.
          mkdir -p build/ios/data/managed
          cp .mono/assemblies/Release/*.dll build/ios/data/managed/

      - name: Upload Corrupted Project for Inspection
        if: failure()  # This ensures it only runs if the previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: broken-ios-project
          path: build/ios/game.xcodeproj/project.pbxproj
          retention-days: 1

      # 5. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/game-unsigned.ipa
