name: "Godot iOS Build (Unsigned)"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Force Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.428'

      # 1. Download and Rename Godot to match your .csproj HintPath
      - name: Setup Godot Mono & Templates
        run: |
          # Download Mono version for macOS
          curl -L -o Godot_mono_osx.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip"
          unzip -q -o Godot_mono_osx.zip
          
          # The zip contains "Godot.app". Rename it to "Godot_mono.app" as required by your csproj
          mv Godot.app Godot_mono.app
          
          # Setup Templates
          curl -L -o Godot_templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz"
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          cp -r /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"

      # 2. Sanitize and Build C#
      - name: Build C# Project
        run: |
          # Remove Windows-specific HintPaths if they exist
          sed -i '' 's|<HintPath>C:.*\\|<HintPath>|g' "Lacie_Engine.csproj"
          
          # Restore and Build specifically for iPhone to skip Steamworks
          dotnet restore "Lacie_Engine.csproj"
          dotnet build "Lacie_Engine.csproj" -c Release /p:GodotTargetPlatform=iphone

      # 3. Generate Godot Metadata (Linking GodotSharp)
      - name: Godot Mono Linker
        run: |
          ./Godot_mono.app/Contents/MacOS/Godot --headless --build-solutions --quit || true

      # 4. Export the Data Pack (.pck)
      - name: Generate Fresh PCK
        run: |
          mkdir -p ios
          ./Godot_mono.app/Contents/MacOS/Godot --no-window --audio-driver Dummy --export-pack "iOS" ios/game.pck

      # 5. Fix Xcode Project file (The "Damaged" error fix)
      - name: Repair Xcode Project Syntax
        run: |
          PBXPROJ="ios/game.xcodeproj/project.pbxproj"
          
          # Stripping Windows Line Endings (CRLF to LF)
          tr -d '\r' < "$PBXPROJ" > "$PBXPROJ.tmp"
          
          # Ensure UTF8 Header is present and clean
          echo "// !\$*UTF8*\$!" > "$PBXPROJ"
          cat "$PBXPROJ.tmp" >> "$PBXPROJ"
          
          # Final Syntax Fixes for Xcode 15+
          sed -i '' 's/path = "game.pck"; sourceTree = "<group>"; }/path = "game.pck"; sourceTree = "<group>"; };/g' "$PBXPROJ"
          sed -i '' 's/path = "Launch Screen.storyboard"; sourceTree = "<group>"; }/path = "Launch Screen.storyboard"; sourceTree = "<group>"; };/g' "$PBXPROJ"

      # 6. Build the actual iOS App
      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios
          xcodebuild \
            -project game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-iOS-Build
          path: ios/build/Release-iphoneos/game.ipa
