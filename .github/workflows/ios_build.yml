name: Build iOS

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_osx.universal.zip
          unzip Godot_v3.5.3-stable_osx.universal.zip -d godot
          sudo mv godot/Godot.app /Applications/Godot.app
          sudo ln -s /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

      - name: Download Godot Export Templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/templates/3.5.3.stable
          cd ~/Library/Application\ Support/Godot/templates/3.5.3.stable
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          tar -xzf Godot_v3.5.3-stable_export_templates.tpz
          mv templates/* .
          rm -rf templates

      - name: Create build directory
        run: |
          rm -rf build
          mkdir build

      - name: Export iOS project
        run: godot --export "iOS" build/ios
        env:
            DISPLAY: :99.0

      - name: Fix plist formatting
        run: |
          plutil -convert xml1 build/ios/export_options.plist
          plutil -convert xml1 build/ios/ios-Info.plist

      - name: Fix Xcode project file
        run: |
          sed -i '' 's/objectVersion = 50;/objectVersion = 46;/' build/ios.xcodeproj/project.pbxproj

      - name: Set iOS Deployment Target
        run: sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0;/IPHONEOS_DEPLOYMENT_TARGET = 12.0;/' build/ios.xcodeproj/project.pbxproj

      - name: Build iOS project
        run: |
          xcodebuild \
          -project build/ios.xcodeproj \
          -scheme ios \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath build/Paper_Lily.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/Paper_Lily.xcarchive/Products/Applications/Paper_Lily.app Payload/
          zip -r Paper_Lily.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ipa
          path: Paper_Lily.ipa
