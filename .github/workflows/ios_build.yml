name: "Godot iOS Build (Unsigned)"

on:
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-ios:
    # iOS builds absolutely require macOS runners to use Xcode
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      # 1. Install Mono on macOS (Required for Godot C#)
      - name: Install Mono
        run: |
          brew update
          brew install mono

      - name: Install NuGet
        run: |
          brew update
          brew install nuget

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4

        with:
          dotnet-version: '6.0.428'

      - name: Pin .NET Version
        run: |
          echo '{"sdk": {"version": "6.0.428", "rollForward": "latestMinor"}}' > global.json

      # 2. Setup Godot & Mirror Templates to both Standard and Mono paths
      - name: Setup Godot & Templates
        run: |
          # Download Standard Godot
          curl -L -o Godot_standard_osx.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_osx.universal.zip"
          unzip -q -o Godot_standard_osx.zip
          
          # Download Mono Templates (They work for both if placed correctly)
          curl -L -o Godot_templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz"
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          
          # Path for Mono (just in case)
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          cp -r /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          
          # Path for Standard (This is where your log said it is looking)
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable/"
          cp -r /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable/"
          
      # 3. Manually Compile C# Solution via MSBuild
      - name: Build C# Project
        run: |
          # Use dotnet but force it to build the project file specifically
          dotnet build Lacie_Engine.csproj -c Release

      # 4. Export via Standard Godot + Manual Assembly Injection
      # 4. Export via Standard Godot + Semicolon Fix + Assembly Injection
     # 4. Export via Standard Godot + Manual Assembly Injection
      - name: Export Xcode Project
        run: |
          mkdir -p build/ios
          
          # Use the Standard Godot binary. 
          # It won't crash because it doesn't have the Mono initialization bug.
          ./Godot.app/Contents/MacOS/Godot --no-window --audio-driver Dummy --export "iOS" build/ios/game.xcodeproj
          
          # MANUALLY inject your pre-compiled DLLs from your repo
          # This makes the "Standard" export work as a "Mono" game.
          mkdir -p build/ios/data/managed
          cp .mono/assemblies/Release/*.dll build/ios/data/managed/

      - name: Repair Damaged Xcode Project
        run: |
          # The file to fix
          PBXPROJ="build/ios/game.xcodeproj/project.pbxproj"

          # 1. Fix the missing semicolon/format for the Launch Screen line
          # This line is missing the name and has a bad path format
          sed -i '' 's/90DD2D9D24B36E8000717FE1 =/90DD2D9D24B36E8000717FE1 \/* Launch Screen.storyboard *\/ =/g' "$PBXPROJ"
          
          # 2. Ensure all lines in the PBXFileReference end with a semicolon before the closing brace
          # Godot sometimes misses these when it crashes
          sed -i '' 's/sourceTree = "<group>"; }/sourceTree = "<group>"; };/g' "$PBXPROJ"

          # 3. Final safety check: Replace any double-bracket errors
          sed -i '' 's/};;/};/g' "$PBXPROJ"
          
          echo "Xcode project repaired. Checking for errors..."
          grep -n "90DD2D9D24B36E8000717FE1" "$PBXPROJ"

      - name: Upload Corrupted Project for Inspection
        if: failure()  # This ensures it only runs if the previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: broken-ios-project
          path: build/ios/game.xcodeproj/project.pbxproj
          retention-days: 1

      - name: Build Xcode Project (Unsigned)
        run: |
          cd build/ios
          xcodebuild build \
            -project Paper-Lily.xcodeproj \
            -scheme "Paper-Lily" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            OTHER_LDFLAGS="-Wl,-ld64"

      # 5. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/game-unsigned.ipa
