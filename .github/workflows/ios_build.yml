name: "Godot iOS Build"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Mono & MSBuild
        run: |
          brew update
          brew install mono-mdk

      - name: Install .NET 6 SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '10.0.0'

      - name: Install NuGet
        run: |
          brew update
          brew install nuget

      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip
          unzip Godot_v3.5.3-stable_mono_osx.universal.zip -d godot
          sudo mv godot/Godot_mono.app /Applications/Godot_mono.app
          sudo ln -s /Applications/Godot_mono.app/Contents/MacOS/Godot /usr/local/bin/godot

      - name: Install Godot Mono export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/templates/3.5.3.stable.mono
          cd ~/Library/Application\ Support/Godot/templates/3.5.3.stable.mono
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz
          unzip Godot_v3.5.3-stable_mono_export_templates.tpz
          mv templates/* .
          rm -rf templates

      - name: Create build directory
        run: |
          rm -rf build
          mkdir build


      - name: Build Mono assemblies
        run: |
          msbuild "Lacie_Engine_Project.csproj" /p:Configuration=Release
          
      - name: Export iOS project
        run: godot --export "iOS" build/Paper_Lily.xcodeproj
        env:
          DISPLAY: :99.0

      - name: Build IPA
        run: |
          xcodebuild -project build/Paper_Lily.xcodeproj \
            -scheme Paper_Lily \
            -configuration Release \
            -archivePath build/Paper_Lily.xcarchive \
            archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

          xcodebuild -exportArchive \
            -archivePath build/Paper_Lily.xcarchive \
            -exportPath build \
            -exportOptionsPlist build/export_options.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily
          path: build/Paper-Lily.ipa
