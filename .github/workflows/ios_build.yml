name: "Godot iOS Build (Unsigned)"

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-ios:
    # iOS builds absolutely require macOS runners to use Xcode
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Install Mono on macOS (Required for Godot C#)
      - name: Install Mono
        run: |
          brew update
          brew install mono

      # 2. Setup Godot Mono & Mono Export Templates for macOS
      - name: Setup Godot Mono & Templates
        run: |
          # Use curl instead of wget for macOS runners
          # Download Mono Engine for macOS
          curl -L -o Godot_mono_osx.zip "https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_osx.universal.zip&platform=osx.universal"
          unzip -q -o Godot_mono_osx.zip
          
          # Download Templates
          curl -L -o Godot_templates.tpz "https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_export_templates.tpz&platform=templates"
          
          # Extract to temporary folder
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          
          # Godot looks for templates in ~/Library/Application Support/Godot/ on macOS
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          mv /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"

      # 3. Export Raw Xcode Project
      - name: Export Xcode Project
        run: |
          mkdir -p build/ios
          
          # By not using the .ipa extension, we force Godot to just dump the Xcode project.
          # We name it 'game' so we know exactly what the Xcode project and scheme will be named.
          ./Godot_mono.app/Contents/MacOS/Godot --no-window --export "iOS" build/ios/game
          
          echo "--- VERIFYING XCODE PROJECT ---"
          ls -la build/ios/

      # 4. Compile Unsigned iOS App
      - name: Compile Unsigned IPA
        run: |
          cd build/ios
          
          # Run xcodebuild and explicitly turn off ALL Apple code signing requirements
          xcodebuild -project game.xcodeproj -scheme game -configuration Release CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO build
          
          # Apple requires .ipa files to contain a folder named exactly "Payload"
          mkdir -p Payload
          
          # Move the compiled .app payload into the folder
          cp -R build/Release-iphoneos/*.app Payload/
          
          # Zip it up as an unsigned .ipa
          zip -q -r game-unsigned.ipa Payload

      # 5. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/game-unsigned.ipa
