name: "Godot iOS Build (Signed)"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Force Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Setup Godot Mono & Templates
        run: |
          # 1. Editor
          curl -L -o Godot_mono_osx.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip"
          unzip -q -o Godot_mono_osx.zip
          
          # 2. Templates
          curl -L -o Godot_templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz"
          mkdir -p /tmp/godot_templates
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          
          # 3. Destination: NO SPACES
          mkdir -p /tmp/mono_libs
          
          # 4. POWER FIND: Search for the libs and copy them
          # This finds the folder wherever it unzipped and copies the contents
          SOURCE=$(find /tmp/godot_templates -name "iphone-mono-libs" -type d | head -n 1)
          if [ -z "$SOURCE" ]; then
            echo "!!! ERROR: iphone-mono-libs NOT FOUND IN ZIP !!!"
            exit 1
          fi
          
          cp -v -r "$SOURCE/"* /tmp/mono_libs/
          
          # 5. VERIFY
          echo "Listing /tmp/mono_libs to confirm success:"
          ls /tmp/mono_libs

      - name: Install Legacy Mono Framework
        run: |
          brew install --cask mono-mdk
          echo "/Library/Frameworks/Mono.framework/Versions/Current/bin" >> $GITHUB_PATH

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.428'
          
      # NEW STEP: Import your signing files from GitHub Secrets
      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILE_PROVISION_BASE64: ${{ secrets.MOBILE_PROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$MOBILE_PROVISION_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Godot Export (Mono Enabled)
        run: |
          mkdir -p ios

          # 1. Prepare presets
          # Replace with your actual Team ID
          sed -i '' 's/application\/app_store_team_id=""/application\/app_store_team_id="Q6SJUT5K5D"/g' export_presets.cfg
          sed -i '' 's/capabilities\/push_notifications=true/capabilities\/push_notifications=false/g' export_presets.cfg
          
          # 2. Export (WE KEEP THE REAL PROJECT FILES)
          # We use --no-build because we will build the C# in the next Xcode step
          ./Godot_mono.app/Contents/MacOS/Godot --headless --export "iOS" "ios/game.xcodeproj" --no-build
          
          # 3. Verification
          if [ -d "ios/game.xcodeproj" ]; then
            echo "✅ Xcode project folder created successfully!"
          else
            echo "❌ Project folder MISSING! Listing directory for debugging:"
            ls -R
            exit 1
          fi
          
          # 4. Apply Xcode Project Fixes
          # Note: Godot 3.5.3 often targets iOS 10.0 by default; 12.0 is safer for modern Mono
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} +
          find ios -name "project.pbxproj" -exec sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' {} +
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "iPhone Distribution";/g' {} +

      - name: Compile C# for iOS
        run: |
          dotnet publish Lacie_Engine.csproj -c Release -r ios-arm64 --self-contained /p:GodotTargetPlatform=iphone /p:BuildProject=false

      - name: Build Signed Xcode Archive
        run: |
          # Use our successful /tmp path
          LIBS="/tmp/mono_libs"
          
          xcodebuild archive \
            -project ios/game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/game.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="243c5777-85f5-48b5-8d71-2378da8f1ab7" \
            DEVELOPMENT_TEAM="Q6SJUT5K5D" \
            PRODUCT_BUNDLE_IDENTIFIER="com.xl.MyXL.Giant-staging" \
            LIBRARY_SEARCH_PATHS="\
              $LIBS/libmonosgen-2.0.xcframework/ios-arm64 \
              $LIBS/libmono-native.xcframework/ios-arm64 \
              $LIBS/libmono-ee-interp.xcframework/ios-arm64 \
              $LIBS/libmono-icall-table.xcframework/ios-arm64 \
              $LIBS/libmono-ilgen.xcframework/ios-arm64 \
              $LIBS/libmono-profiler-log.xcframework/ios-arm64" \
            OTHER_LDFLAGS="-lmonosgen -lmono-native -lmono-ee-interp -lmono-icall-table -lmono-ilgen -lmono-profiler-log" \
            -allowProvisioningUpdates
            
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Extract the app from the archive
          cp -r ios/game.xcarchive/Products/Applications/game.app Payload/
          zip -r Paper-Lily-iOS.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-iOS-Signed
          path: Paper-Lily-iOS.ipa
