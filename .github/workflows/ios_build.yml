name: "Godot iOS Build (Unsigned for TrollStore)"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-26-intel
    # REMOVE THE 'defaults: run: working-directory' SECTION ENTIRELY
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          # This forces the code into the root of the workspace
          # so Lacie_Engine.sln is at /Users/runner/work/Paper-Lily-Mobile-Beta/Lacie_Engine.sln
          path: '.' 

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.428'

      - name: Pin .NET Version
        run: |
          # Now we are in the root, so this creates global.json in the right spot
          echo '{"sdk": {"version": "6.0.428", "rollForward": "latestMinor"}}' > global.json
          dotnet --version

      - name: Setup Godot Mono
        run: |
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip -O Godot.zip
          unzip -q -o Godot.zip
          APP_PATH=$(find . -name "Godot_mono.app" -type d -not -path "./Godot_mono.app" | head -n 1)
          [ -n "$APP_PATH" ] && mv "$APP_PATH" ./Godot_mono.app
          mkdir -p bin
          ln -sf "$PWD/Godot_mono.app/Contents/MacOS/Godot" bin/Godot
          echo "$PWD/bin" >> $GITHUB_PATH
          
          # Setup Templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz -O Templates.tpz
          mkdir -p /tmp/godot_templates
          unzip -q -o Templates.tpz -d /tmp/godot_templates
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono"
          mkdir -p "$TEMPLATE_DIR"
          cp -r /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"

      - name: Build .NET Project
        run: |
          # 1. Detect where the project file is
          PROJ_PATH=$(find . -name "*.csproj" | head -n 1)
          PROJ_DIR=$(dirname "$PROJ_PATH")
          echo "Building project in: $PROJ_DIR"
          
          # 2. Build the specific csproj
          # We output to a local 'out' folder to keep it clean
          dotnet build "$PROJ_PATH" --configuration Release -o "$PROJ_DIR/out"

          # 3. Create the Release folder for Godot
          # Godot 3.x AOT looks here: <project_root>/.mono/assemblies/Release/
          mkdir -p "$PROJ_DIR/.mono/assemblies/Release"

          # 4. Move the compiled DLL and its dependencies
          # We use -n (no-clobber) to avoid overwriting GodotSharp.dll if it's already there
          cp -v "$PROJ_DIR/out/"*.dll "$PROJ_DIR/.mono/assemblies/Release/"

      - name: Export Godot Project
        run: |
          PROJECT_ROOT=$(find . -name "project.godot" -exec dirname {} \;)
          cd "$PROJECT_ROOT"
          
          mkdir -p build/ios
          # Godot will now see the DLLs in the .mono folder we just populated
          Godot --no-window --verbose --export "iOS" build/ios/Paper-Lily.xcodeproj
          
      - name: Compile Xcode Project (Unsigned)
        run: |
          cd build/ios
          # Use the legacy linker flag for Xcode 17+ (the 2026 default)
          xcodebuild build \
            -project Paper-Lily.xcodeproj \
            -scheme "Paper-Lily" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            OTHER_LDFLAGS="-Wl,-ld64"

      - name: Package IPA for TrollStore
        run: |
          cd build/ios
          mkdir -p Payload
          cp -r build/Release-iphoneos/Paper-Lily.app Payload/
          zip -r Paper-Lily-Unsigned.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-TrollStore
          path: build/ios/Paper-Lily-Unsigned.ipa
