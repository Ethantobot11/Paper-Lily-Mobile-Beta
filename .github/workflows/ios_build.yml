name: "Godot iOS Build"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Mono
        run: |
          brew update
          brew install mono

      - name: Install NuGet
        run: |
          brew update
          brew install nuget

      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip
          unzip Godot_v3.5.3-stable_mono_osx.universal.zip
          sudo mv Godot_mono.app /Applications/Godot_mono.app
          sudo ln -s /Applications/Godot_mono.app/Contents/Godot /usr/local/bin/godot

      - name: Install Godot export templates
        run: |
          mkdir -p ~/Library/Application\ Support/Godot/templates/3.5.3.stable
          cd ~/Library/Application\ Support/Godot/templates/3.5.3.stable
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz
          unzip Godot_v3.5.3-stable_mono_export_templates.tpz
          mv templates/* .
          rm -rf templates

      - name: Create build directory
        run: |
          rm -rf build
          mkdir build
          
      - name: Export iOS project
        run: |
            godot --no-window --path . --export "iOS" build/ios/ios
        env:
          DISPLAY: :99.0

      - name: NuGet restore
        run: |
          cd build/ios                            
          nuget restore Lacie Engine.sln

      - name: Build IPA
        run: |
          xcodebuild -project build/ios/ios.xcodeproj \
            -scheme ios \
            -configuration Release \
            -archivePath build/ios.xcarchive \
            archive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

          xcodebuild -exportArchive \
            -archivePath build/ios.xcarchive \
            -exportPath build \
            -exportOptionsPlist build/export_options.plist

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/*.ipa
