name: "Godot iOS Build (Unsigned for TrollStore)"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'

      - name: Setup Godot Mono
        run: |
          # 1. Download Godot Mono
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip -O Godot.zip
          unzip -q -o Godot.zip
          
          # 2. Find the .app folder (wherever it is) and move it to the workspace root
          APP_PATH=$(find . -name "Godot_mono.app" -type d -maxdepth 3 | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: Could not find Godot_mono.app in the zip"
            exit 1
          fi
          mv "$APP_PATH" ./Godot_mono.app
          
          # 3. Create a symlink to make the 'Godot' command available
          mkdir -p bin
          ln -s "$PWD/Godot_mono.app/Contents/MacOS/Godot" bin/Godot
          echo "$PWD/bin" >> $GITHUB_PATH
          
          # 4. Download and Setup Templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz -O Templates.tpz
          mkdir -p /tmp/godot_templates
          unzip -q -o Templates.tpz -d /tmp/godot_templates
          
          # 5. Correct Template Placement
          # Inside the .tpz, there is usually a folder named 'templates'
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono"
          mkdir -p "$TEMPLATE_DIR"
          cp -r /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"

      # 2. Check Godot Path (Verification)
      - name: Verify Godot
        run: Godot --version

      # 2. Export Godot to Xcode Project
      - name: Export Godot Project
        run: |
          mkdir -p build/ios
          Godot --no-window --export "iOS" build/ios/Paper-Lily.xcodeproj

      # 3. Build Unsigned .app bundle
      - name: Compile Xcode Project (Unsigned)
        run: |
          cd build/ios
          xcodebuild build \
            -project Paper-Lily.xcodeproj \
            -scheme "Paper-Lily" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 4. Manually Package into IPA
      # TrollStore accepts .ipa files which are just 'Payload/YourApp.app' zipped up.
      - name: Package IPA for TrollStore
        run: |
          cd build/ios
          mkdir -p Payload
          # Find the compiled .app file and move it into Payload
          cp -r build/Release-iphoneos/Paper-Lily.app Payload/
          zip -r Paper-Lily-Unsigned.ipa Payload
          
      # 5. Upload Artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-TrollStore
          path: build/ios/Paper-Lily-Unsigned.ipa
