name: Build iOS

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Debug Xcode project
        run: ls ios

      - name: Build iOS project
        run: |
          xcodebuild \
          -project ios/ios.xcodeproj \
          -scheme ios \
          -configuration Release \
          -archivePath build/ios.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir Payload
          cp -r build/ios.xcarchive/Products/Applications/ios.app Payload/
          zip -r ios.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Ipa
          path: ios.ipa
