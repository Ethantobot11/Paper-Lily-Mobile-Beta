name: "Godot iOS Build (Unsigned for TrollStore)"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'

      - name: Setup Godot Mono
        run: |
          # 1. Download Godot Mono
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip -O Godot.zip
          unzip -q -o Godot.zip
          
          # 2. Find the .app folder safely
          # We search for it, but excluding the current directory to avoid moving a folder into itself
          APP_PATH=$(find . -name "Godot_mono.app" -type d -not -path "./Godot_mono.app" | head -n 1)
          
          # Only move if it's buried in a subdirectory
          if [ -n "$APP_PATH" ]; then
            echo "Moving Godot from $APP_PATH to root..."
            mv "$APP_PATH" ./Godot_mono.app_temp
            rm -rf ./Godot_mono.app
            mv ./Godot_mono.app_temp ./Godot_mono.app
          fi
          
          # 3. Create a symlink for the 'Godot' command
          mkdir -p bin
          ln -sf "$PWD/Godot_mono.app/Contents/MacOS/Godot" bin/Godot
          echo "$PWD/bin" >> $GITHUB_PATH
          
          # 4. Download and Setup Templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz -O Templates.tpz
          mkdir -p /tmp/godot_templates
          unzip -q -o Templates.tpz -d /tmp/godot_templates
          
          # 5. Correct Template Placement
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono"
          mkdir -p "$TEMPLATE_DIR"
          cp -r /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"

      # 2. Check Godot Path (Verification)
      - name: Verify Godot
        run: Godot --version

      - name: Export Godot Project
        run: |
          # 1. Restore .NET dependencies and build the project solutions
          # This ensures Lacie_Engine.dll and GodotSharp.dll are present
          dotnet restore
          dotnet build --configuration Release
          
          # 2. Create export directory
          mkdir -p build/ios
          
          # 3. Run the export
          # We add --verbose to see exactly where it's looking if it fails again
          Godot --no-window --verbose --export "iOS" build/ios/Paper-Lily.xcodeproj

      # 3. Build Unsigned .app bundle
      - name: Compile Xcode Project (Unsigned)
        run: |
          cd build/ios
          xcodebuild build \
            -project Paper-Lily.xcodeproj \
            -scheme "Paper-Lily" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 4. Manually Package into IPA
      # TrollStore accepts .ipa files which are just 'Payload/YourApp.app' zipped up.
      - name: Package IPA for TrollStore
        run: |
          cd build/ios
          mkdir -p Payload
          # Find the compiled .app file and move it into Payload
          cp -r build/Release-iphoneos/Paper-Lily.app Payload/
          zip -r Paper-Lily-Unsigned.ipa Payload
          
      # 5. Upload Artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-TrollStore
          path: build/ios/Paper-Lily-Unsigned.ipa
