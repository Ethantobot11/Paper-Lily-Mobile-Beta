name: Build iOS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Godot
      run: |
        wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_osx.universal.zip
        unzip Godot_v3.5.3-stable_osx.universal.zip
        sudo mv Godot.app /Applications/Godot.app
        sudo ln -s /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot

    - name: Download Godot Export Templates
      run: |
        mkdir -p ~/Library/Application\ Support/Godot/templates/3.5.3.stable
        cd ~/Library/Application\ Support/Godot/templates/3.5.3.stable
        wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
        unzip Godot_v3.5.3-stable_export_templates.tpz

    - name: Create build directory
      run: mkdir -p build

    - name: Export iOS project
      run: godot --headless --export "iOS" build/Paper_Lily.xcodeproj

    - name: Build iOS project
      run: |
        xcodebuild \
          -project build/Paper_Lily.xcodeproj \
          -scheme Paper_Lily \
          -configuration Development \
          -archivePath build/Paper_Lily.xcarchive \
          archive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO

    - name: Export IPA
      run: |
        cd build/Paper_Lily.xcarchive/Products/Applications
        mkdir Payload
        mv Paper_Lily.app Payload/
        zip -r ../../../../Paper_Lily.ipa Payload

    - name: Upload IPA to GitHub Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Ipa
        path: build/Paper_Lily.ipa
