name: "Godot iOS Build (Signed)"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Force Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install Legacy Mono Framework
        run: |
          brew install --cask mono-mdk
          echo "/Library/Frameworks/Mono.framework/Versions/Current/bin" >> $GITHUB_PATH

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.428'

      - name: Setup Godot Mono & Templates
        run: |
          # 1. Editor
          curl -L -o Godot_mono_osx.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip"
          unzip -q -o Godot_mono_osx.zip
          
          # 2. Templates
          curl -L -o Godot_templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz"
          mkdir -p /tmp/godot_templates
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          
          # 3. Destination: NO SPACES
          # We use /tmp/mono_libs to avoid the "Application Support" space bug
          mkdir -p /tmp/mono_libs
          
          # 4. Copy directly from where we found them in the logs
          cp -r /tmp/godot_templates/templates/iphone-mono-libs/* /tmp/mono_libs/
          
          # 5. VERIFY: This MUST show the .a files now
          echo "Checking /tmp/mono_libs..."
          ls -R /tmp/mono_libs | grep "libmonosgen-2.0.a"

      # NEW STEP: Import your signing files from GitHub Secrets
      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILE_PROVISION_BASE64: ${{ secrets.MOBILE_PROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$MOBILE_PROVISION_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Godot Export (Strict Asset Only)
        run: |
          mkdir -p ios

          # 1. Prepare presets (These files exist in your repo, so we do them first)
          sed -i '' 's/application\/app_store_team_id=""/application\/app_store_team_id="1234567890"/g' export_presets.cfg
          sed -i '' 's/capabilities\/push_notifications=true/capabilities\/push_notifications=false/g' export_presets.cfg
          
          # 2. Back up and Ghost the project
          cp Lacie_Engine.csproj Lacie_Engine.csproj.bak
          cp project.godot project.godot.bak
          echo '<?xml version="1.0" encoding="utf-8"?><Project ToolsVersion="4.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003"><PropertyGroup><ProjectGuid>{00000000-0000-0000-0000-000000000000}</ProjectGuid><OutputType>Library</OutputType><OutputPath>bin\Release</OutputPath><AssemblyName>Lacie_Engine</AssemblyName><TargetFrameworkVersion>v4.7.2</TargetFrameworkVersion></PropertyGroup></Project>' > Lacie_Engine.csproj
          sed -i '' '/\[mono\]/d' project.godot
          
          # 3. Export to a DIRECTORY path.
          # THIS IS THE STEP THAT CREATES THE ios/game.xcodeproj FOLDER
          ./Godot_mono.app/Contents/MacOS/Godot --headless --export "iOS" "ios/game.xcodeproj" --no-build || true
          [ -d "ios/game.xcodeproj" ] && echo "Project folder created successfully!" || echo "Project folder MISSING!"
          
          # 4. FIX: If Godot created a .zip or .ipa by mistake, we ignore it.
          # We ensure the directory exists for the next steps.
          if [ ! -d "ios/game.xcodeproj" ]; then
            echo "Xcode project folder not found! Checking if Godot exported a file instead..."
            ls -R ios/
          fi

          # 5. NOW apply the fixes to the project file
          # We use "find" to make sure we hit the file even if Godot nested it
          find ios -name "project.pbxproj" -exec sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 10.0/IPHONEOS_DEPLOYMENT_TARGET = 12.0/g' {} +
          find ios -name "project.pbxproj" -exec sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' {} +
          find ios -name "project.pbxproj" -exec sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "iPhone Distribution";/g' {} +
          
          # 5. Restore real files
          mv Lacie_Engine.csproj.bak Lacie_Engine.csproj
          mv project.godot.bak project.godot

      - name: Compile C# for iOS
        run: |
          dotnet publish Lacie_Engine.csproj -c Release -r ios-arm64 --self-contained /p:GodotTargetPlatform=iphone /p:BuildProject=false

      - name: Build Signed Xcode Archive
        run: |
          # Use the path we just verified in the Setup step
          LIBS_DIR="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/iphone-mono-libs"
          
          # Define paths (Notice I removed the extra "/templates/")
          MONO_LIB_PATH="$LIBS_DIR/libmonosgen-2.0.xcframework/ios-arm64"
          NATIVE_LIB_PATH="$LIBS_DIR/libmono-native.xcframework/ios-arm64"
          INTERP_LIB_PATH="$LIBS_DIR/libmono-ee-interp.xcframework/ios-arm64"
          ICALL_LIB_PATH="$LIBS_DIR/libmono-icall-table.xcframework/ios-arm64"
          ILGEN_LIB_PATH="$LIBS_DIR/libmono-ilgen.xcframework/ios-arm64"
          PROFILER_LIB_PATH="$LIBS_DIR/libmono-profiler-log.xcframework/ios-arm64"

          xcodebuild archive \
            -project ios/game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/game.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="243c5777-85f5-48b5-8d71-2378da8f1ab7" \
            DEVELOPMENT_TEAM="Q6SJUT5K5D" \
            PRODUCT_BUNDLE_IDENTIFIER="com.xl.MyXL.Giant-staging" \
            LIBRARY_SEARCH_PATHS="\"$MONO_LIB_PATH\" \"$NATIVE_LIB_PATH\" \"$INTERP_LIB_PATH\" \"$ICALL_LIB_PATH\" \"$ILGEN_LIB_PATH\" \"$PROFILER_LIB_PATH\"" \
            OTHER_LDFLAGS="-lmonosgen-2.0 -lmono-native -lmono-ee-interp -lmono-icall-table -lmono-ilgen -lmono-profiler-log" \
            -allowProvisioningUpdates
            
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Extract the app from the archive
          cp -r ios/game.xcarchive/Products/Applications/game.app Payload/
          zip -r Paper-Lily-iOS.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-iOS-Signed
          path: Paper-Lily-iOS.ipa
