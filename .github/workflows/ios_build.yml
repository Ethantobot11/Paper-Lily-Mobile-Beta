name: "Godot iOS Build (Unsigned for TrollStore)"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    # IMPORTANT: You MUST use an Intel runner for Godot 3.5.x Mono AOT stability
    runs-on: macos-26-intel 
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          # Use 6.0 for Godot tools and 3.1 for your specific project reqs
          dotnet-version: |
            6.0.x
            3.1.x

      - name: Pin .NET Version
        run: |
          # This forces the runner to stop using .NET 10 and use 6.0 instead
          echo '{"sdk": {"version": "6.0.x", "rollForward": "latestMinor"}}' > global.json
            
      - name: Setup Godot Mono
        run: |
          # Download Godot Mono
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip -O Godot.zip
          unzip -q -o Godot.zip
          
          # Find and move the app to a stable location
          APP_PATH=$(find . -name "Godot_mono.app" -type d -not -path "./Godot_mono.app" | head -n 1)
          if [ -n "$APP_PATH" ]; then
            mv "$APP_PATH" ./Godot_mono.app
          fi
          
          # Link the executable
          mkdir -p bin
          ln -sf "$PWD/Godot_mono.app/Contents/MacOS/Godot" bin/Godot
          echo "$PWD/bin" >> $GITHUB_PATH
          
          # Setup Templates
          wget -nv https://github.com/godotengine/godot-builds/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz -O Templates.tpz
          mkdir -p /tmp/godot_templates
          unzip -q -o Templates.tpz -d /tmp/godot_templates
          TEMPLATE_DIR="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono"
          mkdir -p "$TEMPLATE_DIR"
          cp -r /tmp/godot_templates/templates/* "$TEMPLATE_DIR/"

      - name: Restore and Build
        run: |
          # Use '--path' if your sln is not in the root
          dotnet restore Lacie_Engine.sln
          dotnet build Lacie_Engine.sln --configuration Release
          
      - name: Export Godot Project
        run: |
          mkdir -p build/ios
          # We add the --no-window flag and force the build
          Godot --no-window --verbose --export "iOS" build/ios/Paper-Lily.xcodeproj

      - name: Compile Xcode Project (Unsigned)
        run: |
          cd build/ios
          xcodebuild build \
            -project Paper-Lily.xcodeproj \
            -scheme "Paper-Lily" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Package IPA for TrollStore
        run: |
          cd build/ios
          mkdir -p Payload
          # Move the .app folder into Payload
          cp -r build/Release-iphoneos/Paper-Lily.app Payload/
          zip -r Paper-Lily-Unsigned.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-TrollStore
          path: build/ios/Paper-Lily-Unsigned.ipa
