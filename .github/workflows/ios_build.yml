name: "Godot iOS Build (Unsigned)"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Force Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Hard Reset Project Metadata
        run: |
          # Delete any leftover Windows build artifacts
          rm -rf .mono/
          rm -rf bin/
          rm -rf obj/
          
          # Create a fresh metadata structure for Mac
          mkdir -p .mono/metadata
          
          # Force the HintPath to point ONLY to the Mac App we downloaded
          # This overwrites whatever was in your csproj originally
          sed -i '' 's|<Reference Include="GodotSharp">.*</Reference>|<Reference Include="GodotSharp"><HintPath>$(ProjectDir)/Godot_mono.app/Contents/Resources/GodotSharp/Api/Release/GodotSharp.dll</HintPath></Reference>|g' "Lacie_Engine.csproj"
          sed -i '' 's|<Reference Include="GodotSharpEditor">.*</Reference>|<Reference Include="GodotSharpEditor"><HintPath>$(ProjectDir)/Godot_mono.app/Contents/Resources/GodotSharp/Api/Release/GodotSharpEditor.dll</HintPath></Reference>|g' "Lacie_Engine.csproj"

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.428'

      - name: Sanitize project.godot
        run: |
          # Remove editor-only settings that might confuse the headless exporter
          sed -i '' '/\[editor\]/d' project.godot
          sed -i '' '/script_templates_search_path/d' project.godot
          
          # Force GLES2 for the exporter if GLES3 is causing driver issues on the runner
          # (Sometimes the software renderer on Mac runners hates GLES3)
          sed -i '' 's/quality\/driver\/driver_name="GLES3"/quality\/driver\/driver_name="GLES2"/g' project.godot
          
          # Fix the double mono entry
          sed -i '' '/unhandled_exception_policy=1/d' project.godot
          echo '[mono]' >> project.godot
          echo 'project/assembly_name="Lacie_Engine"' >> project.godot
          echo 'runtime/unhandled_exception_policy=1' >> project.godot

      # 1. Download and Prepare Godot
      - name: Setup Godot Mono & Templates
        run: |
          # Download Mono version for macOS
          curl -L -o Godot_mono_osx.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip"
          unzip -q -o Godot_mono_osx.zip
          
          # Check if it's named Godot.app or Godot_mono.app and ensure it's Godot_mono.app
          if [ -d "Godot.app" ]; then
            mv Godot.app Godot_mono.app
          fi
          
          # Setup Templates
          curl -L -o Godot_templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz"
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          cp -r /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"

      - name: Force .NET 6.0 and Build
        run: |
          echo '{"sdk": {"version": "6.0.428"}}' > global.json
          
          # 1. Path to the DLLs inside the Mac App
          # Verify this path matches your unzip location!
          export GODOT_DLL_PATH="$(pwd)/Godot_mono.app/Contents/Resources/GodotSharp/Api/Release"
          
          # 2. STRIP HintPaths from the .csproj
          # This removes the hardcoded Windows paths so MSBuild is FORCED to use our ReferencePath
          sed -i '' 's|<HintPath>.*</HintPath>||g' "Lacie_Engine.csproj"
          
          # 3. Restore
          dotnet restore "Lacie_Engine.csproj"
          
          # 4. Build
          # We pass ReferencePath AND AdditionalLibPaths just to be safe
          dotnet build "Lacie_Engine.csproj" \
            -c Release \
            /p:Configuration=Release \
            /p:Platform=iPhone \
            /p:GodotTargetPlatform=ios \
            /p:ReferencePath="$GODOT_DLL_PATH" \
            /p:AdditionalLibPaths="$GODOT_DLL_PATH"

      # 5. Fresh Export (This replaces the manual "Repair" step)
      - name: Godot Export to iOS
        run: |
          mkdir -p ios/
          # Using --no-window for Godot 3.5.3
          ./Godot_mono.app/Contents/MacOS/Godot --no-window --export "iOS" ios/game.xcodeproj
          
      # 6. Build the actual iOS App
      - name: Build Xcode Project (Unsigned)
        run: |
          # No need to cd ios, Godot 3.5 creates the folder structure
          xcodebuild \
            -project ios/game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 6. Build the actual iOS App
      - name: Build Xcode Project (Unsigned)
        run: |
          cd ios
          xcodebuild \
            -project game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-iOS-Build
          path: ios/build/Release-iphoneos/game.ipa
