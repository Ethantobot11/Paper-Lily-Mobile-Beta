name: "Godot iOS Build (Signed)"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-14
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      - name: Check PCK size
        run: ls -lh pack/

      - name: Force Xcode 15.4
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install Legacy Mono Framework
        run: |
          brew install --cask mono-mdk
          echo "/Library/Frameworks/Mono.framework/Versions/Current/bin" >> $GITHUB_PATH

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.428'

      - name: Setup Godot Mono & Templates
        run: |
          # 1. Download Editor & Templates
          curl -L -o Godot_mono_osx.zip "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_osx.universal.zip"
          unzip -q -o Godot_mono_osx.zip
          curl -L -o Godot_templates.tpz "https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_mono_export_templates.tpz"
          
          # 2. Extract to a temp location first
          mkdir -p /tmp/extract
          unzip -q -o Godot_templates.tpz -d /tmp/extract
          
          # 3. Find the actual 'templates' folder inside the zip
          # The .tpz usually contains a folder named 'templates'
          REAL_TEMPLATES_DIR=$(find /tmp/extract -name "iphone.zip" -exec dirname {} \;)
          echo "Templates found at: $REAL_TEMPLATES_DIR"

          # 4. Copy to Official Godot Path (for the Export step)
          GODOT_HABITAT="$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono"
          mkdir -p "$GODOT_HABITAT"
          cp -r "$REAL_TEMPLATES_DIR"/* "$GODOT_HABITAT/"
          
          # 5. Copy to Linker Path (for the Xcode step)
          mkdir -p /tmp/mono_libs
          cp -r "$GODOT_HABITAT/iphone-mono-libs/"* /tmp/mono_libs/
          
          # 6. FINAL VERIFICATION
          echo "Checking Official Path for iphone.zip:"
          ls "$GODOT_HABITAT/iphone.zip"
          echo "Checking Linker Path for libs:"
          ls /tmp/mono_libs/libmonosgen-2.0.xcframework/ios-arm64/libmonosgen.a

          # 7. FIX: Find the Godot_mono.app folder dynamically
          APP_PATH=$(find . -name "Godot_mono.app" -type d | head -n 1)
          echo "Found Godot App at: $APP_PATH"

          # 8. Copy the GodotSharp API to the project root
          if [ -d "$APP_PATH/Contents/Resources/GodotSharp" ]; then
                cp -r "$APP_PATH/Contents/Resources/GodotSharp" ./
                echo "✅ GodotSharp copied successfully."
          else
                echo "❌ ERROR: Could not find GodotSharp inside $APP_PATH"
                exit 1
          fi

          # 9. Create the global shortcut
          sudo ln -s "$(pwd)/$APP_PATH/Contents/MacOS/Godot" /usr/local/bin/godot

          # 10. Final Verification
          ls -l ./GodotSharp/Api/Release/GodotSharp.dll
          
      # NEW STEP: Import your signing files from GitHub Secrets
      - name: Install Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          MOBILE_PROVISION_BASE64: ${{ secrets.MOBILE_PROVISION_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$MOBILE_PROVISION_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Godot Export (Official Mono Way)
        run: |
          mkdir -p ios
          # Running with --path . ensures it finds the local GodotSharp folder we just copied
          godot --path . --headless --verbose --export "iOS" "ios/game.xcodeproj"
          
          # 3. VERIFY: Godot should have created 'data_Lacie_Engine' folder in the Xcode project
          # This folder contains the AOT-compiled code that makes the game actually run.
          ls -R ios/data_Lacie_Engine || echo "❌ AOT DATA MISSING!"
          
      - name: Compile C# for iOS
        run: |
          dotnet publish Lacie_Engine.csproj -c Release -r ios-arm64 --self-contained /p:GodotTargetPlatform=iphone /p:BuildProject=false
          find . -name "project_assembly.dll"
          find . -name "libmonosgen-2.0.a"

      - name: Build Signed Xcode Archive
        run: |
          LIBS="/tmp/mono_libs"
          
          xcodebuild archive \
            -project ios/game.xcodeproj \
            -scheme "game" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/game.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="243c5777-85f5-48b5-8d71-2378da8f1ab7" \
            DEVELOPMENT_TEAM="Q6SJUT5K5D" \
            PRODUCT_BUNDLE_IDENTIFIER="com.xl.MyXL.Giant-staging" \
            LIBRARY_SEARCH_PATHS="\
              $LIBS/libmonosgen-2.0.xcframework/ios-arm64 \
              $LIBS/libmono-native.xcframework/ios-arm64 \
              $LIBS/libmono-ee-interp.xcframework/ios-arm64 \
              $LIBS/libmono-icall-table.xcframework/ios-arm64 \
              $LIBS/libmono-ilgen.xcframework/ios-arm64 \
              $LIBS/libmono-profiler-log.xcframework/ios-arm64" \
            OTHER_LDFLAGS="-lmonosgen -lmono-native -lmono-ee-interp -lmono-icall-table -lmono-ilgen -lmono-profiler-log -liconv -lz -framework AudioToolbox -framework AVFoundation -framework CoreAudio -framework CoreGraphics -framework CoreMedia -framework CoreVideo -framework MediaPlayer -framework MobileCoreServices -framework OpenGLES -framework QuartzCore -framework Security -framework UIKit" \
            OTHER_CFLAGS="-DREAL_T_IS_DOUBLE -include $(pwd)/ios/godot_mono_setup.cpp" \
            -allowProvisioningUpdates
            
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Extract the app from the archive
          cp -r ios/game.xcarchive/Products/Applications/game.app Payload/
          zip -r Paper-Lily-iOS.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-iOS
          path: Paper-Lily-iOS.ipa
