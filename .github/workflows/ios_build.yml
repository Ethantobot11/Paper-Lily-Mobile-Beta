name: "Godot iOS Build (Unsigned for TrollStore)"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  export-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.x'

      # 1. Setup Godot Mono & Templates
      - name: Setup Godot Mono
        run: |
          # Use --content-disposition to handle the redirect filenames correctly
          wget -nv --content-disposition "https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_osx.universal.zip&platform=macos.universal" -O Godot.zip
          unzip -q -o Godot.zip
          
          # Find the extracted folder (it usually has 'mono_osx' in the name)
          EXTRACTED_DIR=$(ls -d *mono_osx* | head -n 1)
          mv "$EXTRACTED_DIR/Godot_mono.app" .
          echo "$GITHUB_WORKSPACE/Godot_mono.app/Contents/MacOS" >> $GITHUB_PATH
          
          # Download Templates
          wget -nv --content-disposition "https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_export_templates.tpz&platform=templates" -O Templates.tpz
          unzip -q -o Templates.tpz -d /tmp/godot_templates
          
          # Prepare the local template folder
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          mv /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"

      # 2. Check Godot Path (Verification)
      - name: Verify Godot
        run: Godot --version

      # 2. Export Godot to Xcode Project
      - name: Export Godot Project
        run: |
          mkdir -p build/ios
          Godot --no-window --export "iOS" build/ios/Paper-Lily.xcodeproj

      # 3. Build Unsigned .app bundle
      - name: Compile Xcode Project (Unsigned)
        run: |
          cd build/ios
          xcodebuild build \
            -project Paper-Lily.xcodeproj \
            -scheme "Paper-Lily" \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      # 4. Manually Package into IPA
      # TrollStore accepts .ipa files which are just 'Payload/YourApp.app' zipped up.
      - name: Package IPA for TrollStore
        run: |
          cd build/ios
          mkdir -p Payload
          # Find the compiled .app file and move it into Payload
          cp -r build/Release-iphoneos/Paper-Lily.app Payload/
          zip -r Paper-Lily-Unsigned.ipa Payload
          
      # 5. Upload Artifact
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Paper-Lily-TrollStore
          path: build/ios/Paper-Lily-Unsigned.ipa
