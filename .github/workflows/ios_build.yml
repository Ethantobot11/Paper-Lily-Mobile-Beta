name: "Godot iOS Build (Unsigned)"

on:
  workflow_dispatch:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-ios:
    # iOS builds absolutely require macOS runners to use Xcode
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: false
          fetch-depth: 0

      # 1. Install Mono on macOS (Required for Godot C#)
      - name: Install Mono
        run: |
          brew update
          brew install mono

      - name: Install NuGet
        run: |
          brew update
          brew install nuget

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4

        with:
          dotnet-version: '6.0.428'

      - name: Pin .NET Version
        run: |
          echo '{"sdk": {"version": "6.0.428", "rollForward": "latestMinor"}}' > global.json

      # 2. Setup Godot Mono & Mono Export Templates for macOS
      # 2. Setup STANDARD Godot (To avoid the Mono crash)
      - name: Setup Standard Godot & Templates
        run: |
          # Download STANDARD Engine (Non-Mono) to bypass the NULL cString crash
          curl -L -o Godot_standard_osx.zip "https://downloads.godotengine.org/3.5.3/Godot_v3.5.3-stable_osx.universal.zip"
          unzip -q -o Godot_standard_osx.zip
          
          # Use the same Mono templates you already downloaded (they contain the iOS binaries)
          curl -L -o Godot_templates.tpz "https://downloads.godotengine.org/3.5.3/mono/Godot_v3.5.3-stable_mono_export_templates.tpz"
          unzip -q -o Godot_templates.tpz -d /tmp/godot_templates
          
          mkdir -p "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          mv /tmp/godot_templates/templates/* "$HOME/Library/Application Support/Godot/templates/3.5.3.stable.mono/"
          
      # 3. Manually Compile C# Solution via MSBuild
      - name: Build C# Project
        run: |
          # Use dotnet but force it to build the project file specifically
          dotnet build Lacie_Engine.csproj -c Release

      # 4. Export via Standard Godot + Manual Assembly Injection
      - name: Export Xcode Project
        run: |
          mkdir -p build/ios
          
          # We use the STANDARD Godot.app here. 
          # It won't crash because it doesn't look for Mono during initialization.
          ./Godot.app/Contents/MacOS/Godot --no-window --audio-driver Dummy --export "iOS" build/ios/game.xcodeproj
          
          # Now, we MANUALLY inject the Mono flavor into the standard export.
          # This folder is where Godot 3.5.x C# games store their logic.
          mkdir -p build/ios/data/managed
          cp -r .mono/assemblies/Release/*.dll build/ios/data/managed/

      - name: Upload Corrupted Project for Inspection
        if: failure()  # This ensures it only runs if the previous step failed
        uses: actions/upload-artifact@v4
        with:
          name: broken-ios-project
          path: build/ios/game.xcodeproj/project.pbxproj
          retention-days: 1

      # 5. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: build/ios/game-unsigned.ipa
