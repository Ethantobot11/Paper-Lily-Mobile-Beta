name: "Godot Android Build"

on: [push, pull_request]

env:
  # Opt-in to Node.js 24 for future-proofing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Java 11 (Still required for Android tools)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 2. Create Debug Keystore
      - name: Create Debug Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12

      # 3. Configure Godot Editor Settings for Android
      - name: Configure Godot Editor
        run: |
          mkdir -p ~/.config/godot/
          cat <<EOF > ~/.config/godot/editor_settings-3.tres
          [gd_resource type="EditorSettings" format=2]

          [resource]
          export/android/android_sdk_path = "$ANDROID_HOME"
          export/android/debug_keystore = "$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      # 4. Use the Marketplace Action to Export
      - name: Godot Export
        uses: firebelley/godot-export@v7.0.0
        with:
          # Point directly to Godot 3.5.3
          godot_executable_download_url: https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_linux_headless_64.zip&platform=linux_server.headless.64
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          relative_project_path: ./
          archive_output: false
          export_debug: true
        env:
          # Must match the name of the preset in your export_presets.cfg
          EXPORT_PRESET: Android
          EXPORT_PATH: build/android/game.apk

      # 5. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/game.apk
