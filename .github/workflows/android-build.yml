name: "Godot Android Build"

on:
  workflow_dispatch:
  workflow_call:

env:
  # Opt-in to Node.js 24 for future-proofing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup Java 11 (Still required for Android tools)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 4. Use the Marketplace Action to Export
      - name: Godot Export
        uses: firebelley/godot-export@v7.0.0
        with:
          # Point directly to Godot 3.5.3
          godot_executable_download_url: https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_linux_headless_64.zip&platform=linux_server.headless.64
          godot_export_templates_download_url: https://downloads.godotengine.org/?version=3.5.3&flavor=stable&slug=mono_linux_server_64.zip&platform=linux_server.64
          relative_project_path: ./
          archive_output: false
          export_debug: true
        env:
          # Must match the name of the preset in your export_presets.cfg
          EXPORT_PRESET: Android
          EXPORT_PATH: ./Lacie Engine-1.6-v1.5.1-release.apk

      # 5. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./Lacie Engine-1.6-v1.5.1-release.apk
