name: Godot Android Build

on: [push, pull_request]

env:
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  export-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install Java 17 (needed for sdkmanager)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Install Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android Packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"

      - name: Add Android Build Tools to PATH
        run: echo "$ANDROID_HOME/build-tools/33.0.2" >> $GITHUB_PATH

      # Switch to Java 11 for Godot
      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # Download Godot
      - name: Download Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -o Godot_v3.5.3-stable_linux_headless.64.zip
          sudo mv Godot_v3.5.3-stable_linux_headless.64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          unzip -o Godot_v3.5.3-stable_export_templates.tpz -d ~/.local/share/godot/templates/3.5.3.stable
          mv ~/.local/share/godot/templates/3.5.3.stable/templates/* ~/.local/share/godot/templates/3.5.3.stable/

      # Create Debug Keystore
      - name: Create Debug Keystore
        run: |
          keytool -genkeypair \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -keystore debug.keystore \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

      # Configure Godot
      - name: Configure Godot
        run: |
          mkdir -p ~/.config/godot

          cat > ~/.config/godot/editor_settings-3.tres <<EOF
          [gd_resource type="EditorSettings" format=2]

          [resource]

          export/android/android_sdk_path="$ANDROID_HOME"
          export/android/debug_keystore="$GITHUB_WORKSPACE/debug.keystore"
          export/android/debug_keystore_user="androiddebugkey"
          export/android/debug_keystore_pass="android"
          EOF

      - name: Import Project
        run: godot --no-window --editor --quit

      # Export APK
      - name: Export APK
        run: |
          mkdir -p build/android
          godot --no-window --export "Android" build/android/game.apk

      # Upload
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/game.apk
