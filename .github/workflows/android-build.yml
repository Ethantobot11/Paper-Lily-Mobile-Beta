name: "Godot Android Build"
on: [push, pull_request]

jobs:
  export-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Java (Required for Android builds)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # 2. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.2

      # 3. Download Godot and Export Templates
      - name: Download Godot & Templates
        run: |
          # Download Godot Headless
          wget -q https://downloads.tuxfamily.org/godotengine/3.5.3/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip Godot_v3.5.3-stable_linux_headless.64.zip
          mv Godot_v3.5.3-stable_linux_headless.64 /usr/local/bin/godot
          
          # Download Templates
          wget -q https://downloads.tuxfamily.org/godotengine/3.5.3/Godot_v3.5.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          unzip Godot_v3.5.3-stable_export_templates.tpz -d ~/.local/share/godot/templates/3.5.3.stable
          mv ~/.local/share/godot/templates/3.5.3.stable/templates/* ~/.local/share/godot/templates/3.5.3.stable/

      # 4. Configure Godot Editor Settings
      # This tells Godot where to find the Android SDK on the runner
      - name: Configure Godot
        run: |
          mkdir -p ~/.config/godot/
          echo 'export/android/android_sdk_path = "/usr/local/lib/android/sdk"' >> ~/.config/godot/editor_settings-3.tres
          echo 'export/android/debug_keystore = "'$GITHUB_WORKSPACE'/debug.keystore"' >> ~/.config/godot/editor_settings-3.tres

      # 5. Create a Debug Keystore (Required for Android Export)
      - name: Create Debug Keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999 -deststoretype pkcs12

      # 6. Export APK
      # Replace "Android" with the exact name of your export preset in Godot
      - name: Export Android
        run: |
          mkdir -p build/android
          godot --export "Android" build/android/game.apk

      # 7. Upload Artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/game.apk
