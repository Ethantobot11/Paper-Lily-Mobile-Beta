name: Godot Android Build

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANDROID_HOME: /usr/local/lib/android/sdk

jobs:
  export-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Java (Godot 3.5 needs JDK 11)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      # Install Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK Packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "platforms;android-33"
          sdkmanager "build-tools;33.0.2"

      # Download Godot + Templates
      - name: Download Godot & Templates
        run: |
          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_linux_headless.64.zip
          unzip -o Godot_v3.5.3-stable_linux_headless.64.zip
          sudo mv Godot_v3.5.3-stable_linux_headless.64 /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot

          wget https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_export_templates.tpz
          mkdir -p ~/.local/share/godot/templates/3.5.3.stable
          unzip -o Godot_v3.5.3-stable_export_templates.tpz -d ~/.local/share/godot/templates/3.5.3.stable
          mv ~/.local/share/godot/templates/3.5.3.stable/templates/* ~/.local/share/godot/templates/3.5.3.stable/

      # Create Debug Keystore
      - name: Create Debug Keystore
        run: |
          keytool -genkeypair \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -keystore debug.keystore \
          -storepass android \
          -keypass android \
          -dname "CN=Android Debug,O=Android,C=US"

      # Configure Godot
      - name: Configure Godot Editor
        run: |
          mkdir -p ~/.config/godot

          echo 'export/android/android_sdk_path = "'$ANDROID_HOME'"' >> ~/.config/godot/editor_settings-3.tres
          echo 'export/android/debug_keystore = "'$GITHUB_WORKSPACE'/debug.keystore"' >> ~/.config/godot/editor_settings-3.tres
          echo 'export/android/debug_keystore_user = "androiddebugkey"' >> ~/.config/godot/editor_settings-3.tres
          echo 'export/android/debug_keystore_pass = "android"' >> ~/.config/godot/editor_settings-3.tres

      # Export APK
      - name: Export Android
        run: |
          mkdir -p build/android
          godot --no-window --export "Android" build/android/game.apk

      # Upload APK
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/android/game.apk
